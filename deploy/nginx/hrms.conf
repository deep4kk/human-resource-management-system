# HRMS Nginx Configuration
# Place this file in /etc/nginx/sites-available/hrms
# Then symlink: ln -s /etc/nginx/sites-available/hrms /etc/nginx/sites-enabled/

# Upstream backend server
upstream hrms_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Upstream frontend server
upstream hrms_web {
    server 127.0.0.1:3001;
    keepalive 32;
}

# HTTP server - redirect to HTTPS
server {
    listen 80;
    server_name hrserver.flowmative.in hrms.flowmative.in;

    # Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server for API (hrserver.flowmative.in)
server {
    listen 443 ssl http2;
    server_name hrserver.flowmative.in;

    ssl_certificate /etc/letsencrypt/live/hrserver.flowmative.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hrserver.flowmative.in/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/hrserver.flowmative.in/chain.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API proxy
    location / {
        proxy_pass http://hrms_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://hrms_api/health;
        access_log off;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
}

# HTTPS server for Frontend (hrms.flowmative.in)
server {
    listen 443 ssl http2;
    server_name hrms.flowmative.in;

    ssl_certificate /etc/letsencrypt/live/hrms.flowmative.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hrms.flowmative.in/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/hrms.flowmative.in/chain.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/hrms/frontend/dist/public;
    index index.html;

    # Frontend proxy (if running dev mode)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy for frontend
    location /api/ {
        proxy_pass http://hrms_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Static assets caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
}
